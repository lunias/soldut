name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-linux:
    name: Linux (native gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install X11 + GL dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libasound2-dev

      - name: Build raylib (static)
        run: make raylib

      - name: Build soldut
        run: make -j$(nproc)

      - name: Build soldut_editor
        run: make editor -j$(nproc)

      # Headless / state-only tests run fine in CI (no display needed).
      # The shot-mode editor tests need a GL context, so they're not
      # run here yet — the bake-test rig will move them to a
      # virtual-display job in M5 P18.
      - name: Run regression tests (test-physics, test-level-io, test-spawn)
        run: |
          make test-physics
          make test-level-io
          make test-spawn

      - name: Show binaries
        run: |
          ls -la ./soldut ./build/soldut_editor
          file ./soldut ./build/soldut_editor

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-linux-x86_64
          path: |
            soldut
            build/soldut_editor

  build-windows:
    name: Windows (zig cc cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cross-build to Windows (game + editor)
        run: ./cross-windows.sh

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-windows-x86_64
          path: |
            build/windows/Soldut.exe
            build/windows/SoldutEditor.exe

  build-macos:
    name: macOS (native clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build raylib (static)
        run: make raylib

      - name: Build soldut
        run: make -j$(sysctl -n hw.ncpu)

      - name: Build soldut_editor
        run: make editor -j$(sysctl -n hw.ncpu)

      - name: Run regression tests
        run: |
          make test-physics
          make test-level-io
          make test-spawn

      - name: Show binaries
        run: |
          ls -la ./soldut ./build/soldut_editor
          file ./soldut ./build/soldut_editor

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-macos
          path: |
            soldut
            build/soldut_editor
