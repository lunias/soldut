name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-linux:
    name: Linux (native gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install X11 + GL dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libasound2-dev

      - name: Build raylib (static)
        run: make raylib

      - name: Build soldut
        run: make -j$(nproc)

      - name: Build soldut_editor
        run: make editor -j$(nproc)

      # Headless / state-only tests run fine in CI (no display needed).
      # The shot-mode editor tests need a GL context, so they're not
      # run here yet — the bake-test rig will move them to a
      # virtual-display job in M5 P18.
      - name: Run regression tests (test-physics, test-level-io, test-spawn, test-pickups, test-ctf, test-snapshot)
        run: |
          make test-physics
          make test-level-io
          make test-spawn
          make test-pickups
          make test-ctf
          make test-snapshot

      - name: Show binaries
        run: |
          ls -la ./soldut ./build/soldut_editor
          file ./soldut ./build/soldut_editor

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-linux-x86_64
          path: |
            soldut
            build/soldut_editor
            assets/fonts
            assets/maps
            assets/shaders
            assets/sprites
            assets/ui
            assets/credits.txt

  build-windows:
    name: Windows (zig cc cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cross-build to Windows (game + editor)
        run: ./cross-windows.sh

      # The .exe loads textures / fonts / shaders / parallax relative
      # to its working directory, so the runtime needs the assets/
      # tree alongside it. Stage everything into build/windows/ so
      # actions/upload-artifact preserves the relative layout — the
      # extracted zip is the user's playable directory.
      - name: Stage assets next to Soldut.exe
        run: |
          mkdir -p build/windows/assets
          cp -r assets/fonts    build/windows/assets/
          cp -r assets/maps     build/windows/assets/
          cp -r assets/shaders  build/windows/assets/
          cp -r assets/sprites  build/windows/assets/
          cp -r assets/ui       build/windows/assets/
          cp    assets/credits.txt build/windows/assets/
          # An empty cfg so the exe picks up its built-in defaults
          # without warning about "soldut.cfg not found". Players can
          # edit this file to tweak port / snapshot_hz / etc.
          cat > build/windows/soldut.cfg <<'CFG'
          # Soldut server config — see documents/05-networking.md
          # All fields are optional; defaults match the in-game settings.
          port=23073
          max_players=16
          mode=ffa
          friendly_fire=0
          # Broadcast rate, 10..60 Hz (Phase 2).
          snapshot_hz=60
          # Render interp delay in ms. Higher = smoother under
          # WAN jitter, more visible lag on remote players. Default
          # 100 ms (~6 snapshot intervals at 60 Hz). Drop to 60..80
          # for LAN play; bump to 120..150 for very jittery WAN.
          # interp_delay_ms=100
          CFG
          ls -la build/windows/
          ls -la build/windows/assets/

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-windows-x86_64
          path: |
            build/windows/Soldut.exe
            build/windows/SoldutEditor.exe
            build/windows/soldut.cfg
            build/windows/assets

  build-macos:
    name: macOS (native clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build raylib (static)
        run: make raylib

      - name: Build soldut
        run: make -j$(sysctl -n hw.ncpu)

      - name: Build soldut_editor
        run: make editor -j$(sysctl -n hw.ncpu)

      - name: Run regression tests
        run: |
          make test-physics
          make test-level-io
          make test-spawn
          make test-pickups
          make test-ctf
          make test-snapshot

      - name: Show binaries
        run: |
          ls -la ./soldut ./build/soldut_editor
          file ./soldut ./build/soldut_editor

      - uses: actions/upload-artifact@v7
        with:
          name: soldut-macos
          path: |
            soldut
            build/soldut_editor
            assets/fonts
            assets/maps
            assets/shaders
            assets/sprites
            assets/ui
            assets/credits.txt
